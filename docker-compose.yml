services:
  byos:
    build:
      context: .
    env_file:
      - .env
    ports:
      - "${BYOS_PORT:-8787}:8787"
      - "${BYOS_SMTP_PORT:-2525}:2525"
    volumes:
      - byos_whatsapp_auth:/app/data/.wwebjs_auth
      - byos_runtime:/app/data/runtime
    restart: unless-stopped

volumes:
  byos_whatsapp_auth:
  byos_runtime:
